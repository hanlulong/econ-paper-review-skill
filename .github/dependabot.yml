version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns: ["*"]
  - package-ecosystem: npm
    directory: /review-viewer
    schedule:
      interval: monthly
    groups:
      viewer-dependencies:
        patterns: ["*"]
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: monthly
